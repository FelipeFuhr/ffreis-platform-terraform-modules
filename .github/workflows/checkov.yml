name: Checkov (compliance)

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checkov:
    uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-checkov.yml@main
    with:
      scan-directory: "."
