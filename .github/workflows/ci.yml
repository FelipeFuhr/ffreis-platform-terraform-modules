name: CI

# Triggers: every PR and every push to main.
# Job dependency graph:
#
#   secret-scan ─┐
#   fmt ─────────┼─→ validate   (per module)
#                ├─→ lint
#                ├─→ security   (trivy)
#                ├─→ tfsec
#                └─→ test-tidy  (Go test module hygiene)
#
# Any failure blocks all downstream jobs.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── 1. Secret scan ─────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scan
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-gitleaks.yml@main
    with:
      working-directory: "."
      scan-history: true
      upload-sarif: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}

  fmt:
    uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-fmt.yml@main
    with:
      working-directory: "."

  # ── 3. Validate (all modules) ───────────────────────────────────────────────
  validate:
    needs: [fmt]
    uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-validate.yml@main
    with:
      validate-all-modules: true
      modules-dir: "modules"

  # ── 4. Lint ─────────────────────────────────────────────────────────────────
  lint:
    needs: [fmt]
    uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-lint.yml@main

  # ── 5. Security (Trivy) ──────────────────────────────────────────────────────
  security:
    needs: [fmt]
    uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-security.yml@main

  # ── 6. Security (tfsec) ──────────────────────────────────────────────────────
  tfsec:
    needs: [fmt]
    uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-tfsec.yml@main

  # ── 6. Test module hygiene ──────────────────────────────────────────────────
  test-tidy:
    needs: [fmt]
    uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-test-tidy.yml@main
