name: DevOps / Security

on:
  pull_request:
  push:
    branches: [main, master]
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    permissions:
      contents: read
      actions: read
      security-events: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        id: gitleaks
        uses: gacts/gitleaks@9d471d3bda7ee95b6fa416fdfe7e87cf393554d5
        with:
          version: 8.24.3
          config-path: .gitleaks.toml
          path: .
          github-token: ${{ github.token }}

  trivy-fs:
    name: Trivy (Terraform config)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Trivy config scan (SARIF)
        id: trivy
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: sarif
          output: trivy.sarif

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@d4b3ca9fa7f69d38bfcd667bdc45bc373d16277e
        with:
          sarif_file: trivy.sarif

      - name: Trivy findings (table)
        if: failure()
        continue-on-error: true
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "0"
          format: table

  grype-fs:
    permissions:
      contents: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-scan-grype-fs.yml@c3e3e0a44d4b79697f1babaa9bf287d1b264da52
    with:
      path: "."
      upload-sarif: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}

  osv:
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-osv-scanner.yml@c3e3e0a44d4b79697f1babaa9bf287d1b264da52
    with:
      working-directory: "."
      upload-sarif: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
