name: DevOps / Terraform Checks

on:
  pull_request:
    paths:
      - "**/*.tf"
      - ".github/workflows/**"
  push:
    branches: [main, master]
    paths:
      - "**/*.tf"
      - ".github/workflows/**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-fmt.yml@main
    with:
      working-directory: "."

  validate:
    uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-validate.yml@main
    needs: [fmt]
    with:
      validate-all-modules: true
      modules-dir: "modules"

  lint:
    uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-lint.yml@main
    needs: [fmt]
    with:
      lint-path: "."

  trivy-config:
    uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-security.yml@main
    needs: [fmt]
    with:
      scan-ref: "."

  tfsec:
    uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-tfsec.yml@main
    needs: [fmt]
    with:
      scan-path: "."
      minimum-severity: "HIGH"
      soft-fail: false

  checkov:
    uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-checkov.yml@main
    needs: [fmt]
    with:
      scan-directory: "."
      framework: "terraform"
      soft-fail: false

  semgrep:
    uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-semgrep.yml@main
    needs: [fmt]
    with:
      working-directory: "."
      config: "p/terraform"

