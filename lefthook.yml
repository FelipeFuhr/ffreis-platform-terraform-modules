pre-commit:
  parallel: true
  commands:
    hygiene-merge-markers:
      run: ./scripts/hooks/check_merge_markers.sh
    hygiene-large-files:
      run: ./scripts/hooks/check_large_files.sh
    hygiene-binary-files:
      run: ./scripts/hooks/check_binary_files.sh
    fmt-check:
      run: make fmt-check
    lint:
      glob: "**/*.tf"
      run: tflint --recursive --format compact
    validate:
      glob: "**/*.tf"
      run: make validate
    secret-scan:
      run: make secrets-scan-staged

pre-push:
  parallel: false
  commands:
    lint:
      run: make lint
    validate:
      run: make validate

commit-msg:
  commands:
    conventional-commits:
      run: ./scripts/hooks/check_commit_msg.sh {1}
